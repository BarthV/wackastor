services:
  wackastor:
    image: node:22
    working_dir: /wackastor
    volumes:
      - .:/wackastor
    ports:
      - '5173:5173'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wackastor
      CI: 'true'
    command: >
      sh -c "npm install -g pnpm &&
             pnpm install &&
             pnpm drizzle-kit push &&
             pnpm dev"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: wackastor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
